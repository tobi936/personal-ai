services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - CHROMA_HOST=http://chromadb:8000
    volumes:
      - backend_data:/app/data
    depends_on:
      - ollama
      - chromadb

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # GPU-Support: eigene docker-compose.gpu.yml verwenden (siehe README)

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    volumes:
      - ollama_data:/root/.ollama
    env_file:
      - .env
    entrypoint: >
      sh -c "
        sleep 5 &&
        ollama pull ${OLLAMA_MODEL:-llama3.2:3b} &&
        ollama pull nomic-embed-text
      "
    environment:
      - OLLAMA_HOST=http://ollama:11434

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

volumes:
  backend_data:
  ollama_data:
  chroma_data:
